[policy]
# Public safe profile does not include real nodes.
# 请在 QX 本地添加节点/订阅，或把下面节点名替换成你实际订阅里的节点名。
# 节点名沿用 Loon：usa 搬瓦工 / usa rack / NL 搬瓦工
static=节点选择,usa 搬瓦工,usa rack,NL 搬瓦工,自动选择,direct,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png
url-latency-benchmark=自动选择,usa 搬瓦工,usa rack,NL 搬瓦工,url=http://www.gstatic.com/generate_204,interval=600,tolerance=100,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png
fallback=美国优先,usa 搬瓦工,usa rack,NL 搬瓦工,url=http://www.gstatic.com/generate_204,interval=600,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png
fallback=荷兰优先,NL 搬瓦工,usa 搬瓦工,usa rack,url=http://www.gstatic.com/generate_204,interval=600,img-url=https://raw.githubusercontent.com/Toperlock/Quantumult/main/icon/FlagGif/netherlands.gif
static=PROXY,节点选择,自动选择,美国优先,荷兰优先,direct,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png


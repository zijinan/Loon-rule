# Quantumult X Auto Safe
# Date: 2026-05-26
# Author: zijinan / optimized by ChatGPT
# Public safe profile: no real nodes, subscription tokens, UUIDs, passwords, or MITM certificates.
# Migrated from Loon_Advanced_Auto_Safe.conf.

[general]
# 先使用 Quantumult X 更稳的导入语法，避免 DoH 写法导致“无效配置文件”。
# 导入成功后，可以在 QX 的 DNS 页面里手动启用 DoH/DoQ。
dns_exclusion_list=*.local,*.lan,*.home.arpa,captive.apple.com,guzzoni.apple.com
server_check_url=http://www.gstatic.com/generate_204
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
network_check_url=http://connectivitycheck.platform.hicloud.com/generate_204
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js

[dns]
# QX 的 [dns] 里不能把 DoH URL 直接写成 server=https://...
# 这里先保留传统 DNS，保证配置可以导入。
server=223.5.5.5
server=119.29.29.29
server=1.1.1.1
server=8.8.8.8

[policy]
# Public safe profile does not include real nodes.
# 请在 QX 本地添加节点/订阅，或把下面节点名替换成你实际订阅里的节点名。
# 节点名沿用 Loon：usa 搬瓦工 / usa rack / NL 搬瓦工
static=节点选择,usa 搬瓦工,usa rack,NL 搬瓦工,自动选择,DIRECT,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png
url-latency-benchmark=自动选择,usa 搬瓦工,usa rack,NL 搬瓦工,url=http://www.gstatic.com/generate_204,interval=600,tolerance=100,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png
fallback=美国优先,usa 搬瓦工,usa rack,NL 搬瓦工,url=http://www.gstatic.com/generate_204,interval=600,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png
fallback=荷兰优先,NL 搬瓦工,usa 搬瓦工,usa rack,url=http://www.gstatic.com/generate_204,interval=600,img-url=https://raw.githubusercontent.com/Toperlock/Quantumult/main/icon/FlagGif/netherlands.gif
static=PROXY,节点选择,自动选择,美国优先,荷兰优先,DIRECT,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Final.png

static=Apple,DIRECT,节点选择,美国优先,荷兰优先,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Apple.png
static=AI,美国优先,荷兰优先,节点选择,DIRECT,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/OpenAI.png
static=Google,节点选择,美国优先,荷兰优先,DIRECT,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Google.png
static=流媒体,节点选择,美国优先,荷兰优先,DIRECT,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/YouTube.png
static=Netflix,美国优先,荷兰优先,节点选择,DIRECT,img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Netflix.png

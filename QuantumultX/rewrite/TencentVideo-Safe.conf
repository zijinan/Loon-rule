#!name=TencentVideo AntiCache Safe for Quantumult X
#!desc=TencentVideo startup/promo/preload cleanup. Conservative request/rewrite only; no response-body rewrite; avoids large media/image body handling.
#!author=zijinan + ChatGPT
#!homepage=https://github.com/zijinan/Loon-rule
#!date=2026-05-26
#!risk=medium

# Based on:
# - misitechan txsp startup rules
# - previous TencentVideo AntiCache captures in this repo
# - goal: reduce startup ads and cached ad-material tasks without bloating QX cache

# ===== Startup / vmind rules from txsp reference =====
^https?:\/\/[\d\.:]*\/?(defaultts\.tc|vmind\.qqvideo\.tc|finderpdd\.video)\.qq\.com\/\w+ url reject
^https?:\/\/apd-vlive\.apdcdn\.tc\.qq\.com\/vmind\.qqvideo\.tc\.qq\.com\/\w+ url reject
^https?:\/\/apd-\w+\.v\.smtcdns\.com\/(defaultts|omts|vmind\.qqvideo)\.tc\.qq\.com\/\w+ url reject
^https?:\/\/vv\.video\.qq\.com\/(diff|get)vmind url reject-dict
^https?:\/\/vv\.video\.qq\.com\/getvinfo url request-body &sppreviewtype=\d(.*)&spsrt=\d request-body &sppreviewtype=0$1&spsrt=0

# ===== Capture-confirmed startup/material paths =====
# Narrow path reject only. Do not MITM or rewrite broad gtimg/qpic/video CDN responses.
^https?:\/\/pgdt\.gtimg\.cn\/141\/20204\/snscosdownload\/SZ\/reserved url reject
^https?:\/\/ossgw\.alicdn\.com\/creatives-assets\/prod\/feupload\/user\/5mcuu url reject
^https?:\/\/vfiles\.gtimg\.cn\/wupload\/ad_control_config_test url reject
^https?:\/\/i\.gtimg\.cn\/qqlive\/images\/20170912\/enter_gray\.png url reject
^https?:\/\/vip\.image\.video\.qpic\.cn\/wupload\/xy\/promotionTest\/ url reject

# ===== Small config/ad endpoints only =====
^https:\/\/(config\.ab\.qq\.com|tab\.video\.qq\.com)\/tab\/GetTabRemoteConfig url reject-dict
^https:\/\/config\.ab\.qq\.com\/tab\/GetTabToggle url reject-dict
^https:\/\/appcfg\.v\.qq\.com\/getconf url reject-dict
^https:\/\/rdelivery\.qq\.com\/(v3\/config\/pull|v1\/sdkconfig\/get) url reject-dict
^https:\/\/playproxy\.video\.qq\.com\/monet\/comm_resource\/get url reject-dict
^https:\/\/iwan\.video\.qq\.com\/trpc\.vgopen\.mini_game_detail\.MiniGameDetail\/GetPreloadGames url reject-dict

# ===== i.video request-stage filter =====
# Reads only POST request body and returns tiny 204 for ad/preload/promotional trpc services.
# No response-body modification, no video CDN modification.
^https:\/\/i\.video\.qq\.com\/?$ url script-request-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/script/TencentVideo-AntiCache.js

hostname = vv.video.qq.com, pgdt.gtimg.cn, ossgw.alicdn.com, vfiles.gtimg.cn, i.gtimg.cn, vip.image.video.qpic.cn, config.ab.qq.com, tab.video.qq.com, appcfg.v.qq.com, rdelivery.qq.com, playproxy.video.qq.com, iwan.video.qq.com, i.video.qq.com

[filter_local]
# Block QUIC / HTTP3. QX 不同版本对 AND/PROTOCOL 语法兼容性可能不同；若导入报错，就在 UI 里用“阻止 QUIC / UDP 443”开关或等价规则。
AND,((PROTOCOL,UDP),(DEST-PORT,443)),REJECT
AND,((PROTOCOL,UDP),(DST-PORT,443)),REJECT

# Extra direct safety
HOST-SUFFIX,local,DIRECT
HOST-SUFFIX,lan,DIRECT
IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
IP-CIDR,192.168.0.0/16,DIRECT,no-resolve

# Final rules
GEOIP,CN,DIRECT
FINAL,兜底

[rewrite_local]
# 默认不开重写，避免视频、微信、支付、游戏异常。


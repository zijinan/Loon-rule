# Private Loon example. This file contains placeholders only.
# Keep your real copy local. Do not commit real nodes, subscriptions, UUIDs, passwords, Reality keys, short-ids, Hysteria2 passwords, MITM CA files, private domains, or tokens.

[Remote Proxy]
# Put subscription URLs here in your local-only private config.
YOUR_SUBSCRIPTION_NAME = YOUR_SUBSCRIPTION_URL,parser-enabled=true,enabled=true

[Proxy]
# Hysteria2 example placeholder.
YOUR_HY2_NODE_NAME = hysteria2,server=YOUR_PRIVATE_DOMAIN,port=443,password=YOUR_PASSWORD,udp=true,sni=YOUR_PRIVATE_DOMAIN,skip-cert-verify=false

# VLESS Reality example placeholder.
YOUR_REALITY_NODE_NAME = vless,server=YOUR_PRIVATE_DOMAIN,port=443,uuid=YOUR_UUID,tls=true,reality=true,public-key=YOUR_REALITY_PUBLIC_KEY,short-id=YOUR_REALITY_SHORT_ID,sni=YOUR_PRIVATE_DOMAIN,udp=true

# Trojan example placeholder.
YOUR_TROJAN_NODE_NAME = trojan,server=YOUR_PRIVATE_DOMAIN,port=443,password=YOUR_PASSWORD,tls=true,sni=YOUR_PRIVATE_DOMAIN,udp=true

[Mitm]
# Install or regenerate MITM CA in Loon locally. Do not store real values in Git.
hostname =
ca-p12 = YOUR_CA_P12_REMOVED
ca-passphrase = YOUR_CA_PASSPHRASE_REMOVED
skip-server-cert-verify = false

# NAME: KuGouMusic-Clean
# DESC: Quantumult X rewrite for selected KuGou Music ad/report/promotion endpoints.
# RISK: medium; disabled by default in the main config.

hostname = mobilelog.kugou.com, acsing.kugou.com, youthimgbssdl.kugou.com, welfare.kugou.com, mdpfilebssdlbig.kugou.com, nbcollect.kugou.com, rt-m.kugou.com, d.kugou.com, filter.kugou.com, push.mobile.kugou.com, install2.kugou.com, config.mobile.kugou.com

# Ad tracking config and report endpoints.
^https?:\/\/mobilelog\.kugou\.com\/adtrackconfig\.json url reject-dict
^https?:\/\/nbcollect\.kugou\.com\/v3\/post url reject-dict
^https?:\/\/rt-m\.kugou\.com\/v2\/post url reject-dict
^https?:\/\/d\.kugou\.com\/v2\/(post|gen) url reject-dict
^https?:\/\/filter\.kugou\.com\/v1\/exposureupload url reject-dict
^https?:\/\/push\.mobile\.kugou\.com\/v1\/report\/device url reject-dict
^https?:\/\/install2\.kugou\.com\/(mobileuc|lifecycle)\/ url reject

# Captured promotion image. Keep core cover and media CDN untouched.
^https?:\/\/mdpfilebssdlbig\.kugou\.com\/[0-9a-f]{32}\.png url reject

# Small JSON cleanup only.
^https?:\/\/config\.mobile\.kugou\.com\/v2\/appconfig\/index url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/script/KugouMusic.ad.js
^https?:\/\/acsing\.kugou\.com\/sing7\/json\/v2\/cdn\/big_gift_list\/v2 url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/script/KugouMusic.ad.js
^https?:\/\/acsing\.kugou\.com\/sing7\/kingsbounty\/json\/v2\/cdn\/douge\/get_bounty_homepage url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/script/KugouMusic.ad.js
^https?:\/\/youthimgbssdl\.kugou\.com\/[^\/]+\.json url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/script/KugouMusic.ad.js
^https?:\/\/welfare\.kugou\.com\/pendant\/v1\/get_user_pendant url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/script/KugouMusic.ad.js

# Tencent Video Safe Cleaner for Quantumult X
# Author: zijinan
# Purpose: targeted Tencent Video ad cleanup from captured Tencent Video traffic.
#
# Safety rules:
# - Do not MITM *.qq.com, *.gtimg.com, *.video.qq.com.
# - Do not script playback getvinfo or video/image segment responses.
# - Only script Tencent Video API endpoints; reject captured ad SDK/material hosts directly.

[rewrite_local]
# Tencent Video ad request modules. The script keeps protobuf/form body lengths stable.
^https?:\/\/i\.video\.qq\.com\/$ url script-request-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_request_ad.js

# Tencent Video embedded ad module observed in i.video.qq.com protobuf/octet-stream responses.
# The script rewrites captured ad material hosts with same-length inert strings.
^https?:\/\/i\.video\.qq\.com\/$ url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_proto_ad.js

# Tencent Video small JSON resource endpoint. Script has its own size/content-type guard.
^https?:\/\/playproxy\.video\.qq\.com\/monet\/comm_resource\/get url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_ad.js
^https?:\/\/(?:tab\.video|appcfg\.v)\.qq\.com\/(?:tab\/GetTabRemoteConfig|getconf) url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_ad.js
^https?:\/\/rdelivery\.qq\.com\/v3\/config\/pull url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_ad.js

# Tencent Video ad/recommendation binary endpoints observed in the capture.
^https?:\/\/iacc(?:\.rec)?\.qq\.com\/$ url reject-200

# GDT / Tencent ad statistics and telemetry.
^https?:\/\/xs\.gdt\.qq\.com\/(?:car|style_factory)\/ url reject-200
^https?:\/\/(?:isrpt-vn|isrpt-in)\.gdt\.qq\.com\/imp_stay_report url reject-200
^https?:\/\/rpt\.gdt\.qq\.com\/monitor_report_process url reject-200
^https?:\/\/vr\.gdt\.qq\.com\/gdt_stats\.fcg url reject-200
^https?:\/\/v3\.gdt\.qq\.com\/gdt_stats\.fcg url reject-200
^https?:\/\/(?:c|c3|nc)\.gdt\.qq\.com\/ url reject-200
^https?:\/\/sdkreport\.e\.qq\.com\/link_event url reject-200
^https?:\/\/h\.trace\.qq\.com\/(?:kv|bosskv) url reject-200
^https?:\/\/info4\.video\.qq\.com\/report url reject-200
^https?:\/\/rmonitor\.qq\.com\/v1\/[^/]+\/upload-json url reject-200
^https?:\/\/rdelivery\.qq\.com\/v1\/statistic\/report url reject-200
^https?:\/\/c3\.gdt\.qq\.com\/ url reject-200
^https?:\/\/review\.gdtimg\.com\/ url reject-200
^https?:\/\/nc\.gdt\.qq\.com\/gdt_report\.fcg url reject-200
^https?:\/\/trace\.inlong\.qq\.com\/atta(?:2nd|3rd)\/dataproxy\/message url reject-200
^https?:\/\/aegis\.qq\.com\/(?:collect|speed) url reject-200

# Captured ad landing/measurement domains. These are not used for playback.
^https?:\/\/(?:track-chain|static-cos|cms)\.jetmobo\.com\/ url reject-200
^https?:\/\/wap-gd-10086-cn-9\.jiangzx\.net\/ url reject-200

# Ad image/material CDN. Keep this as reject-img, not script-response-body.
^https?:\/\/pgdt\.gtimg\.cn\/ url reject-img
^https?:\/\/vfiles\.gtimg\.cn\/wupload\/ad_control_config_test\.ad_copy_pic_url_conf\/ url reject-img
^https?:\/\/vfiles\.gtimg\.cn\/wupload\/xy\/promotionTest\/ url reject-img
^https?:\/\/vip\.image\.video\.qpic\.cn\/wupload\/xy\/promotionTest\/ url reject-img
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject-img

[mitm]
hostname = i.video.qq.com, playproxy.video.qq.com, tab.video.qq.com, appcfg.v.qq.com, rdelivery.qq.com, iacc.qq.com, iacc.rec.qq.com, xs.gdt.qq.com, isrpt-vn.gdt.qq.com, isrpt-in.gdt.qq.com, rpt.gdt.qq.com, vr.gdt.qq.com, v3.gdt.qq.com, c.gdt.qq.com, c3.gdt.qq.com, nc.gdt.qq.com, sdkreport.e.qq.com, h.trace.qq.com, info4.video.qq.com, rmonitor.qq.com, review.gdtimg.com, trace.inlong.qq.com, aegis.qq.com, pgdt.gtimg.cn, vfiles.gtimg.cn, vip.image.video.qpic.cn, dldir1.qq.com, track-chain.jetmobo.com, static-cos.jetmobo.com, cms.jetmobo.com, wap-gd-10086-cn-9.jiangzx.net

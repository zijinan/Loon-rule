#############################################
# Quantumult X Optimized
# Source template: fmz200 QuanX.conf
# Migration reference: Loon/config/Loon_Advanced_Auto_Safe.conf
# Public safe profile: no real nodes, subscription tokens, UUIDs, passwords, or MITM certificates.
#############################################

# =====================================
# general
# =====================================
[general]
server_check_url=http://www.gstatic.com/generate_204
server_check_timeout=3000
profile_img_url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/author/fmz200-01.png

# Keep login/payment/game/CDN domains out of fake-ip where possible.
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn, *.cmbchina.com, *.apple.com, *.icloud.com, *.qq.com, *.tencent.com, *.gtimg.com, *.gtimg.cn, *.qpic.cn, *.qcloud.com, *.myqcloud.com, *.anticheatexpert.com, *.alipay.com, *.taobao.com, *.tmall.com, *.jd.com, *.bilibili.com

geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/fmz200/wool_scripts/main/QuantumultX/scripts/server_location.js
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
excluded_routes=239.255.255.250/32
fallback_udp_policy=reject

# Drop UDP/443 to reduce QUIC bypass and improve rewrite/rule consistency.
# Disable this line manually if a specific node or app depends on QUIC.
udp_drop_list=443


# =====================================
# dns
# =====================================
[dns]
no-ipv6
no-system

# Stable plain DNS for import compatibility. Domestic domains use Ali/Tencent;
# global services below are pinned to Cloudflare/Google plain DNS.
# System DNS is disabled to avoid leaking queries to router DNS.
# If you need encrypted DNS, enable DoH/DoQ from Quantumult X UI.
server=223.5.5.5
server=119.29.29.29
server=1.1.1.1
server=8.8.8.8

# Domestic login/payment/game/CDN domains use domestic resolvers.
server=/*.cn/223.5.5.5
server=/*.apple.com/223.5.5.5
server=/*.apple.com.cn/223.5.5.5

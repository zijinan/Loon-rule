# Tencent Video Safe Cleaner for Quantumult X
# Author: zijinan
# Purpose: targeted Tencent Video ad cleanup from captured Tencent Video traffic.
#
# Safety rules:
# - Do not MITM broad wildcards such as *.qq.com, *.gtimg.com, *.video.qq.com.
# - Only rewrite captured ad-control parameters on getvinfo; never reject playback responses.
# - Reject only captured direct ad material/click/report URLs, not broad Tencent/WeChat hosts.
# - Keep normal Tencent Video UI/feed endpoints intact where possible.

[rewrite_local]
# Captured direct ad material/click/report endpoints. These are downstream of rewritten ad decisions,
# so returning an error/empty result is safer than letting the app keep loading ad assets.
^https?:\/\/pgdt\.gtimg\.cn\/ url reject
^https?:\/\/dldir1\.qq\.com\/qqmi\/video_ad\/ url reject
^https?:\/\/(?:v3|c3)\.gdt\.qq\.com\/ url reject-dict
^https?:\/\/p2\.l\.qq\.com\/ url reject-dict
^https?:\/\/vip\.image\.video\.qpic\.cn\/vupload\/20221226\/99fe431672021919301\.zip url reject
^https?:\/\/(?:vfiles\.gtimg\.cn|vip\.image\.video\.qpic\.cn)\/wupload\/xy\/promotionTest\/ url reject

# Tencent Video core API header parameters. Keep login cookies, only neutralize captured qad ad-platform flag.
^https?:\/\/(?:i\.video\.qq\.com\/|(?:vv|vv6)\.video\.qq\.com\/getvinfo|(?:tab\.video|config\.ab)\.qq\.com\/tab\/GetTabRemoteConfig|richmedia\.video\.qq\.com\/get_rich_media_info) url script-request-header https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_header_ad.js

# Tencent Video ad request modules. The script keeps protobuf/form body lengths stable.
^https?:\/\/i\.video\.qq\.com\/$ url script-request-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_request_ad.js
^https?:\/\/disp-qryapi\.3g\.qq\.com\/v1\/dispatch url script-request-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_request_ad.js
^https?:\/\/(?:vv|vv6)\.video\.qq\.com\/getvinfo url script-request-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_request_ad.js

# Tencent Video IACC ad service. Keep it targeted: rewrite WeChat/open-action hints and prefetch/rank labels only.
^https?:\/\/iacc(?:\.rec)?\.qq\.com\/ url script-request-header https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_iacc_ad.js
^https?:\/\/iacc(?:\.rec)?\.qq\.com\/ url script-request-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_iacc_ad.js
^https?:\/\/iacc(?:\.rec)?\.qq\.com\/ url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_iacc_ad.js

# Tencent Video embedded ad module observed in i.video.qq.com protobuf/octet-stream responses.
# The script rewrites captured ad material hosts with same-length inert strings.
^https?:\/\/i\.video\.qq\.com\/$ url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_proto_ad.js
^https?:\/\/config\.ab\.qq\.com\/tab\/GetTabRemoteConfig url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_proto_ad.js

# Tencent Video small JSON endpoints with observed ad fields. Script has its own size/content-type guard.
^https?:\/\/tab\.video\.qq\.com\/tab\/GetTabRemoteConfig url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_ad.js
^https?:\/\/richmedia\.video\.qq\.com\/get_rich_media_info url script-response-body https://raw.githubusercontent.com/zijinan/Loon-rule/main/QuantumultX/scripts/tencent_video_ad.js

[mitm]
hostname = i.video.qq.com, vv.video.qq.com, vv6.video.qq.com, tab.video.qq.com, config.ab.qq.com, disp-qryapi.3g.qq.com, richmedia.video.qq.com, iacc.qq.com, iacc.rec.qq.com, pgdt.gtimg.cn, dldir1.qq.com, v3.gdt.qq.com, c3.gdt.qq.com, p2.l.qq.com, vip.image.video.qpic.cn, vfiles.gtimg.cn
